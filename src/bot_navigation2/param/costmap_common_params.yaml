# 机器人配置
robot_radius: 0.1  # 机器人半径（单位：米），用于确定与障碍物之间必须保持的最小距离，以避免碰撞。
# footprint: [[x0, y0], [x1, y1], ... [xn, yn]]  # 如果机器人不是圆形的，而是具有多边形的外形，可以在这里定义机器人的足迹（坐标点）。

# 障碍物层配置
obstacle_layer:
  # 全局过滤参数
  max_obstacle_height: 1.0  # 考虑为障碍物的最大高度（单位：米），超过此高度的障碍物将不被纳入考虑。
  obstacle_range: 2.0  # 机器人探测障碍物的最大范围（单位：米），超出此范围的障碍物将不会被检测。
  raytrace_range: 3.0  # 用于射线追踪的范围（单位：米），用于检查机器人路径上的障碍物。
  track_unknown_space: false  # 是否跟踪未知空间。如果设置为true，机器人将不能通过未知区域进行路径规划。
  footprint_clearing_enabled: false  # 是否启用机器人足迹清除功能。如果为true，机器人移动时会清除其占据的区域。
  combination_method: 1  # 多种传感器层合并方法。1通常表示选取不同传感器层的最大代价来更新代价图。
  enabled: true  # 是否启用障碍物层。如果设置为false，障碍物将不会被考虑进代价图中。

# 传感器管理参数
observation_sources: scan  # 指定用于检测障碍物的传感器数据来源。这里使用的是 "scan" 主题（LaserScan 数据）。
# LaserScan 数据的具体配置
  scan:
    data_type: LaserScan  # 指定传感器数据类型，这里是 LaserScan 类型。
    topic: scan  # 指定传感器数据发布的主题。
    observation_persistence: 0  # 观测数据在代价图中保留的时间（单位：秒）。0表示数据会一直保留，直到有新的数据到达。
    expected_update_rate: 0  # 期望的传感器数据更新频率（单位：Hz）。0表示没有特别的更新频率要求。
    marking: true  # 如果为true，探测到的障碍物将在代价图中标记出来。
    clearing: true  # 如果为true，障碍物移除后，机器人移动的区域会在代价图中清除。
    min_obstacle_height: 0.05  # 障碍物的最小高度（单位：米），小于此高度的障碍物将被忽略。
    max_obstacle_height: 0.5  # 障碍物的最大高度（单位：米），高于此高度的障碍物将被忽略。
    obstacle_range: 2.0  # 激光扫描探测障碍物的最大距离（单位：米）。
    raytrace_range: 3.0  # 激光扫描射线追踪的最大范围（单位：米）。
    inf_is_valid: false  # 是否将激光扫描中探测到的无限距离（即未探测到障碍物）视为有效观测。如果为false，表示无限距离的探测结果不视为有效。

# 静态障碍物层配置（固定障碍物，如墙壁等）
static_layer:
  enabled: true  # 是否启用静态障碍物层。如果为false，静态障碍物不会被包含在代价图中。
